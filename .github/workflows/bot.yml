name: Run Stealth Bot

on:
  workflow_dispatch: # Allows manual trigger from the Actions tab
  schedule:
    - cron: '0 14 * * *' # Example: Runs automatically at 2:00 PM UTC daily

jobs:
  run-automation:
    runs-on: macos-latest # This is the critical change for Method 1

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install undetected-chromedriver selenium selenium-stealth requests fake-useragent

      - name: Run Bot Script
        run: python stealth_bot.py

      - name: Upload Debug Screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bot-debug-screenshot
          path: debug_error_visual_flow.png
