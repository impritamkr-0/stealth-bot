name: Run Stealth Bot

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 14 * * *' 

jobs:
  run-automation:
    runs-on: macos-latest 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 150

      - name: Install Dependencies
        run: |
          pip install undetected-chromedriver selenium selenium-stealth requests fake-useragent

      - name: Run Bot Script
        env:
          PROXY_HOST: ${{ secrets.PROXY_HOST }}
          PROXY_PORT: ${{ secrets.PROXY_PORT }}
          PROXY_USER: ${{ secrets.PROXY_USER }}
          PROXY_PASS: ${{ secrets.PROXY_PASS }}
        run: python stealth_bot.py

      - name: Upload Debug Screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bot-debug-screenshot
          path: debug_error_visual_flow.png
