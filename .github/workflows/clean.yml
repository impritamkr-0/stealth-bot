name: Instant History Wipe

on:
  workflow_dispatch:

jobs:
  clear-history:
    runs-on: ubuntu-latest
    steps:
    - name: Delete all old runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ github.token }}
        repository: ${{ github.repository }}
        retain_days: 0
        keep_minimum_runs: 0
